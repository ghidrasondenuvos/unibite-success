<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite - Premium Food Sharing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <h1>[UniBite]</h1>
        <div class="user-info">
            <span style="color:#94a3b8">USER:</span> <strong>student_john</strong> | 
            <span style="color:#94a3b8">CREDITS:</span> <strong id="nav-credits" class="credits-text">5</strong>
        </div>
    </header>

    <main class="container">
        <nav class="tabs">
            <button id="btn-feed" class="btn active">1. ΔΙΑΘΕΣΙΜΑ ΓΕΥΜΑΤΑ</button>
            <button id="btn-create" class="btn">2. ΠΡΟΣΦΟΡΑ ΦΑΓΗΤΟΥ</button>
            <button id="btn-mymeals" class="btn">3. ΤΑ ΓΕΥΜΑΤΑ ΜΟΥ (ΑΞΙΟΛΟΓΗΣΗ)</button>
        </nav>

        <div id="notification" class="hidden" style="margin-bottom: 25px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.2);"></div>

        <section id="view-feed" class="view">
            <div id="ads-grid" class="grid-container"></div>
        </section>

        <section id="view-create" class="view hidden">
            <div class="form-card">
                <h2 style="color: var(--primary); margin-top: 0;">> INIT_NEW_MEAL</h2>
                <form id="create-ad-form">
                    <input type="text" id="ad-title" placeholder=">_ Τίτλος (π.χ. Παστίτσιο)" required>
                    <input type="number" id="ad-portions" placeholder=">_ Διαθέσιμες Μερίδες (Αριθμός)" min="1" required>
                    <input type="text" id="ad-allergens" placeholder=">_ Αλλεργιογόνα (Προαιρετικό)">
                    <input type="text" id="ad-location" placeholder=">_ Τοποθεσία (π.χ. Εστίες)" required>
                    <button type="submit" class="btn btn-primary">ΕΚΤΕΛΕΣΗ (ΔΗΜΟΣΙΕΥΣΗ)</button>
                </form>
            </div>
        </section>

        <section id="view-mymeals" class="view hidden">
            <h2 style="color: var(--warning); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">> ΙΣΤΟΡΙΚΟ ΠΑΡΑΓΓΕΛΙΩΝ & ΑΞΙΟΛΟΓΗΣΕΙΣ</h2>
            <div id="mymeals-grid" class="grid-container">
                <p style="color: rgba(255,255,255,0.5);">Δεν υπάρχουν αιτήματα ακόμα...</p>
            </div>
        </section>

    </main>
    <script src="app.js"></script>
</body>
</html>
